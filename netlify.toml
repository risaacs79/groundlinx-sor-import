# Netlify build + functions config.
# Static site: index.html served from repo root, no build step.
# Serverless functions: netlify/functions/, TypeScript compiled by Netlify automatically.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  # esbuild bundles TS with deps (exceljs, busboy) into the function payload.
  node_bundler = "esbuild"
  # 60s is enough for the full 542-asset upload — sync_sor_extract takes
  # ~2-3 minutes paged through monday so we may need to bump this once
  # we're running the full pipeline. Default Netlify function timeout is
  # 10s, paid plans go higher.
  external_node_modules = []

# Single-page app routing: /api/sync routes to the sync function,
# everything else falls through to index.html.
[[redirects]]
  from = "/api/sync"
  to = "/.netlify/functions/sync"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Light security headers for the upload page.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
